<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIUI Assistant</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src = "script.js" defer></script>
</head>
<body>
    <header>
        <img src="bot.png" alt="DIUI Logo" class="header-icon">
        <h1> DIUI Assistant</h1>
        <p> Asistente virtual para el Diseño de Interces de Usuario</p>
    </header>
    <main role="main">
        <nav class="sidebar" aria-label="Conversaciones">
            <h2>Conversaciones</h2>
            <ul>
                <li>Dudas sobre HTML</li>
                <li>Dudas sobre SQL</li>
                <li>Dudas sobre Álgebra</li>
            </ul>
            <div class="chat-controls">
                <p id="message-counter">Mensajes: 0</p>
                <button id ="clear-chat-btn">Limpiar Chat</button>
            </div>
        </nav>

        <section aria-label="ÁreaDeMensajes" class="chat-area" id="chat-area">
        </section>
    </main>
    <footer>
        <form action="#" method="POST" class="chat-form" id="chat-form">
            <label for="message-input" class="sr-only">Escribe tu mensaje: </label>
            <input type="text" id="message-input" name="message" placeholder="Escribe tu mensaje..." required autocomplete="off">
            <button type="submit" aria-label="Enviar mensaje">Enviar</button>
        </form>
    </footer>
</body>
</html>
